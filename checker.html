<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cannes Data Checker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0f0f0f; color: #ddd; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* ── Top bar ── */
    #topbar {
      background: #171717; border-bottom: 1px solid #2a2a2a;
      padding: 10px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0;
    }
    #topbar h1 { font-size: 14px; color: #c9a84c; font-weight: 700; }
    #progress { font-size: 12px; color: #666; margin-left: 8px; }
    #unsaved-badge {
      background: #7c5200; color: #f4c860; font-size: 11px; font-weight: 700;
      padding: 2px 8px; border-radius: 10px; display: none;
    }
    .spacer { flex: 1; }
    .btn {
      background: #252525; border: 1px solid #3a3a3a; color: #ccc;
      padding: 6px 14px; border-radius: 5px; cursor: pointer; font-size: 12px;
      transition: background 0.1s, border-color 0.1s; white-space: nowrap;
    }
    .btn:hover { background: #333; border-color: #555; }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .btn.gold { background: #c9a84c; border-color: #c9a84c; color: #000; font-weight: 700; }
    .btn.gold:hover { background: #dbbe6a; }
    .btn.green { background: #1a5c2a; border-color: #27ae60; color: #5de88a; font-weight: 600; }
    .btn.green:hover { background: #226633; }

    /* ── Layout ── */
    #body { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ── */
    #sidebar {
      width: 230px; background: #131313; border-right: 1px solid #222;
      overflow-y: auto; flex-shrink: 0; display: flex; flex-direction: column;
    }
    #sidebar::-webkit-scrollbar { width: 4px; }
    #sidebar::-webkit-scrollbar-thumb { background: #333; }
    .sb-section { padding: 10px 0 4px; }
    .sb-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em;
      color: #444; padding: 0 14px 4px; display: block;
    }
    .sb-item {
      padding: 6px 14px; cursor: pointer; font-size: 11px; color: #888;
      border-left: 3px solid transparent; display: flex; justify-content: space-between;
      align-items: center; gap: 6px;
    }
    .sb-item span:first-child { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sb-item:hover { background: #1a1a1a; color: #ccc; }
    .sb-item.active { color: #c9a84c; border-left-color: #c9a84c; background: #1c1910; }
    .sb-count { font-size: 10px; color: #444; background: #1e1e1e; padding: 1px 5px; border-radius: 8px; }
    .sb-item.active .sb-count { background: #2a2110; color: #8a6e30; }

    /* ── Main ── */
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* ── Card area ── */
    #card-area { flex: 1; overflow-y: auto; padding: 20px 24px; }
    #card-area::-webkit-scrollbar { width: 6px; }
    #card-area::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }

    /* ── Welcome ── */
    #welcome { text-align: center; padding: 80px 20px; }
    #welcome h2 { color: #c9a84c; font-size: 22px; margin-bottom: 10px; }
    #welcome p { color: #666; font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
    #welcome .btn { font-size: 14px; padding: 10px 28px; }

    /* ── Card ── */
    #card { max-width: 640px; }

    .card-header {
      display: flex; align-items: center; gap: 10px; margin-bottom: 18px;
    }
    #card-pos { font-size: 13px; color: #888; }
    #card-id { font-family: monospace; font-size: 11px; color: #3a3a3a; margin-left: auto; }
    .status-pill {
      font-size: 10px; padding: 2px 8px; border-radius: 8px; font-weight: 600;
    }
    .pill-pending { background: #1e1e1e; color: #555; }
    .pill-ok { background: #0d2e18; color: #27ae60; }
    .pill-edited { background: #2a1c00; color: #f39c12; }

    /* Fields */
    .field-grid { display: grid; gap: 10px; }
    .field-row { display: grid; grid-template-columns: 110px 1fr; gap: 8px; align-items: center; }
    .field-lbl {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em;
      color: #555; text-align: right; padding-right: 4px;
    }
    .field-in {
      background: #181818; border: 1px solid #2c2c2c; color: #ddd;
      padding: 7px 10px; border-radius: 5px; font-size: 13px; width: 100%;
      font-family: inherit; transition: border-color 0.15s, background 0.15s;
    }
    .field-in:focus { outline: none; border-color: #c9a84c; background: #1c1910; }
    .field-in.changed { border-color: #f39c12 !important; background: #1a1400 !important; }
    select.field-in { cursor: pointer; }

    /* Actions */
    .card-actions {
      margin-top: 18px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .hint { font-size: 11px; color: #3a3a3a; margin-left: auto; }

    /* ── Jump strip ── */
    #jump-strip {
      border-top: 1px solid #1e1e1e; padding: 8px 14px; background: #0f0f0f;
      display: flex; gap: 4px; flex-wrap: wrap; max-height: 80px; overflow-y: auto;
      flex-shrink: 0;
    }
    #jump-strip::-webkit-scrollbar { height: 3px; }
    #jump-strip::-webkit-scrollbar-thumb { background: #2a2a2a; }
    .jump-chip {
      font-size: 10px; padding: 2px 7px; border-radius: 3px; cursor: pointer;
      border: 1px solid #252525; background: #181818; color: #555;
      white-space: nowrap; transition: border-color 0.1s;
    }
    .jump-chip:hover { border-color: #555; color: #aaa; }
    .jump-chip.ok { border-color: #1a4d28; color: #27ae60; background: #0a1f10; }
    .jump-chip.edited { border-color: #4d3300; color: #f39c12; background: #1a1000; }
    .jump-chip.cur { border-color: #c9a84c; color: #c9a84c; background: #1c1910; }
  </style>
</head>
<body>

<div id="topbar">
  <h1>🎬 Cannes Data Checker</h1>
  <span id="progress">No file loaded</span>
  <span id="unsaved-badge">● unsaved changes</span>
  <div class="spacer"></div>
  <input type="file" id="file-input" accept=".js" style="display:none">
  <button class="btn" id="btn-open">Open data.js</button>
  <button class="btn" id="btn-add" disabled>＋ Add Entry</button>
  <button class="btn green" id="btn-save" disabled>💾 Download saved file</button>
</div>

<div id="body">
  <div id="sidebar">
    <div id="sb-inner">
      <div style="padding:30px 14px;color:#3a3a3a;font-size:12px;">Open data.js to begin</div>
    </div>
  </div>

  <div id="main">
    <div id="card-area">

      <div id="welcome">
        <h2>Data Checker</h2>
        <p>Open <strong>data.js</strong> to review screenings.<br>
          Press <kbd style="background:#222;padding:1px 5px;border-radius:3px;font-size:12px">Enter</kbd> to pass a correct entry,
          or edit fields and hit <strong>Save &amp; Next</strong>.</p>
        <button class="btn gold" onclick="openFile()">Open data.js</button>
      </div>

      <div id="card" style="display:none">
        <div class="card-header">
          <button class="btn" id="btn-prev">← Prev</button>
          <span id="card-pos"></span>
          <button class="btn" id="btn-next">Next →</button>
          <span class="status-pill pill-pending" id="status-pill">Pending</span>
          <span id="card-id"></span>
        </div>

        <div class="field-grid" id="fields"></div>

        <div class="card-actions" id="actions-edit">
          <button class="btn green" id="btn-pass">✓ Pass  <small style="opacity:.6">(Enter)</small></button>
          <button class="btn gold" id="btn-save-next">Save &amp; Next</button>
          <button class="btn" id="btn-revert" style="display:none">↺ Revert</button>
          <span class="hint">Tab between fields</span>
        </div>
        <div class="card-actions" id="actions-add" style="display:none">
          <button class="btn gold" id="btn-create">＋ Create Entry</button>
          <button class="btn" id="btn-cancel-add">Cancel</button>
        </div>
      </div>

    </div>

    <datalist id="title-list"></datalist>
    <div id="jump-strip" style="display:none"></div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────
let originalText  = '';
let allScreenings = [];
let filtered      = [];
let currentIdx    = 0;
let reviewed      = new Set();       // ids marked OK without edit
let edits         = new Map();       // id → modified existing screening
let newEntries    = [];              // new screenings to append
let groupMap      = {};              // id → group label from // ─── comments
let groups        = [];              // ordered group names
let filterGroup   = 'all';
let filterVenue   = 'all';
let titleIndex    = new Map();       // normalized title → {director, titleEn, durationMin}
let isAdding      = false;

// ── File I/O ──────────────────────────────────────────────────────────────
function openFile() {
  document.getElementById('file-input').click();
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('file-input').addEventListener('change', function() {
    const file = this.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      originalText = e.target.result;
      parseData(originalText);
      buildGroupMap(originalText);
      buildTitleIndex();
      buildTitleDatalist();
      buildSidebar();
      applyFilter();
      document.getElementById('welcome').style.display = 'none';
      document.getElementById('card').style.display = '';
      document.getElementById('jump-strip').style.display = '';
      document.getElementById('btn-add').disabled = false;
      updateProgress();
    };
    reader.readAsText(file);
  });
});

function saveFile() {
  if (edits.size === 0 && newEntries.length === 0) { alert('No changes to save.'); return; }
  let text = originalText;

  // 1. Replace edited lines
  const failed = [];
  for (const [id, sc] of edits) {
    const re = new RegExp(`^([ \\t]*)s\\('${reEsc(id)}',[^\\n]*$`, 'm');
    if (re.test(text)) {
      text = text.replace(re, makeLine(sc));
    } else {
      failed.push(id);
    }
  }
  if (failed.length) { alert('Could not find lines for:\n' + failed.join('\n')); return; }

  // 2. Append new entries before closing ];
  if (newEntries.length) {
    const appendLines = '\n' + newEntries.map(sc => makeLine(sc)).join('\n');
    const insertAt = text.lastIndexOf('];');
    if (insertAt !== -1) {
      text = text.slice(0, insertAt) + appendLines + '\n' + text.slice(insertAt);
    }
  }

  // Trigger download
  const blob = new Blob([text], { type: 'text/javascript' });
  const url  = URL.createObjectURL(blob);
  const a    = Object.assign(document.createElement('a'), { href: url, download: 'data.js' });
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);

  // Sync in-memory state
  originalText = text;
  for (const [id, sc] of edits) {
    const i = allScreenings.findIndex(x => x.id === id);
    if (i !== -1) allScreenings[i] = sc;
    const j = filtered.findIndex(x => x.id === id);
    if (j !== -1) filtered[j] = sc;
  }
  edits.clear();
  newEntries = [];
  updateProgress();
  updateUnsaved();
  showCurrent();
  alert('data.js downloaded.\nReplace your original data.js with the downloaded file.');
}

// ── Parse ─────────────────────────────────────────────────────────────────
function parseData(text) {
  const win = { SCREENINGS: [], VENUES: [], SECTIONS: [], FESTIVAL_DAYS: [] };
  try {
    new Function('window', text)(win);
    allScreenings = win.SCREENINGS;
  } catch (e) {
    alert('Parse error: ' + e.message);
  }
}

// ── Title index ───────────────────────────────────────────────────────────
function normalize(s) {
  return (s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
}

function buildTitleIndex() {
  titleIndex.clear();
  for (const sc of allScreenings) {
    if (!sc.title) continue;
    const key = normalize(sc.title);
    if (!titleIndex.has(key)) {
      titleIndex.set(key, { title: sc.title, director: sc.director||'', titleEn: sc.titleEn||'', durationMin: sc.durationMin||null });
    } else {
      const e = titleIndex.get(key);
      if (!e.director   && sc.director)   e.director   = sc.director;
      if (!e.titleEn    && sc.titleEn)    e.titleEn    = sc.titleEn;
      if (!e.durationMin && sc.durationMin) e.durationMin = sc.durationMin;
    }
  }
}

function buildTitleDatalist() {
  const dl = document.getElementById('title-list');
  dl.innerHTML = [...titleIndex.values()].map(t => `<option value="${esc(t.title)}">`).join('');
}

// Auto-fill director/titleEn/duration when title matches a known movie
function autoFillFromTitle(titleVal) {
  const info = titleIndex.get(normalize(titleVal));
  if (!info) return;
  const map = { director: 'f-director', titleEn: 'f-titleEn', durationMin: 'f-durationMin' };
  for (const [key, id] of Object.entries(map)) {
    const el = document.getElementById(id);
    if (el && !el.value && info[key]) { el.value = info[key]; el.classList.add('changed'); }
  }
}

// Propagate meta (director/titleEn/durationMin) to all screenings with same title
function propagateMeta(sc) {
  const norm = normalize(sc.title);
  const peers = allScreenings.filter(x => x.id !== sc.id && normalize(x.title) === norm);
  if (!peers.length) return;
  const toUpdate = peers.filter(x => {
    const cur = edits.get(x.id) || x;
    return cur.director !== sc.director || (cur.titleEn||'') !== (sc.titleEn||'') ||
           String(cur.durationMin||'') !== String(sc.durationMin||'');
  });
  if (!toUpdate.length) return;
  if (!confirm(`Propagate director / title EN / duration to ${toUpdate.length} other screening(s) of "${sc.title}"?`)) return;
  for (const other of toUpdate) {
    const updated = { ...(edits.get(other.id) || other), director: sc.director, titleEn: sc.titleEn, durationMin: sc.durationMin };
    edits.set(other.id, updated);
    const i = allScreenings.findIndex(x => x.id === other.id);
    if (i !== -1) allScreenings[i] = updated;
    const j = filtered.findIndex(x => x.id === other.id);
    if (j !== -1) filtered[j] = updated;
  }
  // Refresh title index with updated data
  buildTitleIndex();
}

// ── Serialize ─────────────────────────────────────────────────────────────
function makeLine(sc) {
  const day = parseInt((sc.date || '2026-05-14').split('-')[2]) || 14;
  const dur = minsToStr(sc.durationMin);
  const sq  = v => "'" + (v == null ? '' : String(v)).replace(/\\/g,'\\\\').replace(/'/g,"\\'") + "'";
  const flags = JSON.stringify(sc.flags || []);
  let extra = '';
  const ex = {};
  if (sc.isFree)      ex.isFree = true;
  if (sc.isProgramme) ex.isProgramme = true;
  if (sc.films && sc.films.length) ex.films = sc.films;
  if (Object.keys(ex).length) extra = ',' + JSON.stringify(ex);
  return `  s(${sq(sc.id)},${sq(sc.title)},${sq(sc.titleEn)},${sq(sc.director)},${sq(sc.section)},${sq(sc.venue)},${day},${sq(sc.startTime)},${sq(dur)},${flags}${extra}),`;
}

function minsToStr(m) {
  if (!m) return '';
  const h = Math.floor(m / 60), min = m % 60;
  return min === 0 ? `${h}h` : `${h}h${String(min).padStart(2,'0')}`;
}

function reEsc(s) {
  return s.replace(/[.*+?^${}()|[\]\\-]/g, '\\$&');
}

// ── Group map (from // ─── comments) ─────────────────────────────────────
function buildGroupMap(text) {
  groupMap = {};
  groups = [];
  const seen = new Set();
  let currentGroup = null;
  for (const line of text.split('\n')) {
    // Match screening-level separators: // ─── NAME ─────────
    const m = line.match(/\/\/ ─{3,}\s+(.+)/);
    if (m) {
      const name = m[1].replace(/\s*─+\s*$/, '').trim();
      currentGroup = name;
      if (!seen.has(name)) { seen.add(name); groups.push(name); }
    }
    const id = (line.match(/s\('([^']+)'/) || [])[1];
    if (id && currentGroup) groupMap[id] = currentGroup;
  }
}

// ── Filter ────────────────────────────────────────────────────────────────
function applyFilter() {
  filtered = allScreenings.filter(sc => {
    if (filterGroup !== 'all' && groupMap[sc.id] !== filterGroup) return false;
    if (filterVenue !== 'all' && sc.venue !== filterVenue)         return false;
    return true;
  });
  currentIdx = 0;
  showCurrent();
  buildJump();
  updateProgress();
}

// ── Sidebar ───────────────────────────────────────────────────────────────
function buildSidebar() {
  const grpCnt = {}, venCnt = {};
  for (const sc of allScreenings) {
    const g = groupMap[sc.id] || '—';
    grpCnt[g] = (grpCnt[g] || 0) + 1;
    venCnt[sc.venue] = (venCnt[sc.venue] || 0) + 1;
  }

  let html = `<div class="sb-section">
    <span class="sb-label">Group</span>
    ${sbItem('group','all','All',allScreenings.length)}`;
  for (const g of groups) {
    html += sbItem('group', g, g, grpCnt[g] || 0);
  }
  html += `</div><div class="sb-section" style="border-top:1px solid #1e1e1e">
    <span class="sb-label">Venue</span>
    ${sbItem('venue','all','All',allScreenings.length)}`;
  for (const [k,c] of Object.entries(venCnt).sort((a,b)=>a[0].localeCompare(b[0]))) {
    html += sbItem('venue', k, k, c);
  }
  html += `</div>`;
  document.getElementById('sb-inner').innerHTML = html;
}

function sbItem(type, val, label, cnt) {
  const cur = type === 'group' ? filterGroup : filterVenue;
  const active = cur === val ? 'active' : '';
  const safeVal = val.replace(/'/g,"\\'");
  return `<div class="sb-item ${active}" data-type="${type}" data-val="${esc(val)}" onclick="setFilter('${type}','${safeVal}')">
    <span title="${esc(val)}">${esc(label)}</span><span class="sb-count">${cnt}</span>
  </div>`;
}

function setFilter(type, val) {
  if (type === 'group') filterGroup = val; else filterVenue = val;
  document.querySelectorAll(`.sb-item[data-type="${type}"]`).forEach(el => {
    el.classList.toggle('active', el.dataset.val === val);
  });
  applyFilter();
}

// ── Display ───────────────────────────────────────────────────────────────
const SECTIONS = ['competition','hors-competition','cannes-premiere','seance-speciale',
  'un-certain-regard','cannes-classics','cinema-de-demain','seances-du-lendemain',
  'quinzaine','semaine-critique','acid','reprise','plage'];
const VENUES   = ['GTL','DE','AV','BU','BA','CRO','OLY','AR','MIR','ST','AL','RAI',
  'CI-I','CI-A','CI-X','CI-3','PLAGE'];

function getSc() {
  const sc = filtered[currentIdx];
  return edits.get(sc.id) || sc;
}

function showCurrent() {
  if (!filtered.length) {
    document.getElementById('card-pos').textContent = 'No results';
    document.getElementById('fields').innerHTML = '';
    document.getElementById('card-id').textContent = '';
    return;
  }

  const sc = getSc();
  const orig = allScreenings.find(x => x.id === sc.id) || sc;
  const isEdited   = edits.has(sc.id);
  const isReviewed = reviewed.has(sc.id);

  document.getElementById('card-pos').textContent = `${currentIdx + 1} / ${filtered.length}`;
  document.getElementById('card-id').textContent  = sc.id;

  const pill = document.getElementById('status-pill');
  if (isEdited)        { pill.textContent = 'Modified ●'; pill.className = 'status-pill pill-edited'; }
  else if (isReviewed) { pill.textContent = 'OK ✓';       pill.className = 'status-pill pill-ok'; }
  else                 { pill.textContent = 'Pending';     pill.className = 'status-pill pill-pending'; }

  const FIELDS = [
    { key:'title',       label:'Title',          type:'text'   },
    { key:'titleEn',     label:'Title (EN)',      type:'text'   },
    { key:'director',    label:'Director',        type:'text'   },
    { key:'section',     label:'Section',         type:'select', opts:SECTIONS },
    { key:'venue',       label:'Venue',           type:'select', opts:VENUES   },
    { key:'date',        label:'Date',            type:'text'   },
    { key:'startTime',   label:'Start Time',      type:'text'   },
    { key:'durationMin', label:'Duration (min)',  type:'number' },
    { key:'flags',       label:'Flags',           type:'text',  serialize: v => (v||[]).join(','), parse: v => v.split(',').map(x=>x.trim()).filter(Boolean) },
  ];

  let html = '';
  for (const f of FIELDS) {
    let rawVal = sc[f.key];
    const origVal = orig[f.key];
    const displayVal = f.serialize ? f.serialize(rawVal) : (rawVal == null ? '' : rawVal);
    const origDisplay = f.serialize ? f.serialize(origVal) : (origVal == null ? '' : origVal);
    const changed = isEdited && String(displayVal) !== String(origDisplay) ? 'changed' : '';

    let inp;
    if (f.type === 'select') {
      const opts = f.opts.map(o => `<option value="${o}"${o===rawVal?' selected':''}>${o}</option>`).join('');
      inp = `<select class="field-in ${changed}" data-key="${f.key}" id="f-${f.key}">${opts}</select>`;
    } else {
      inp = `<input type="${f.type}" class="field-in ${changed}" data-key="${f.key}" id="f-${f.key}" value="${esc(String(displayVal))}">`;
    }
    html += `<div class="field-row"><div class="field-lbl">${f.label}</div><div>${inp}</div></div>`;
  }
  document.getElementById('fields').innerHTML = html;

  // Watch changes + auto-fill from title
  document.querySelectorAll('.field-in').forEach(el => {
    el.addEventListener('input', markChanged);
    el.addEventListener('change', markChanged);
  });
  const titleEl = document.getElementById('f-title');
  if (titleEl) {
    titleEl.setAttribute('list', 'title-list');
    titleEl.addEventListener('change', () => autoFillFromTitle(titleEl.value));
  }

  document.getElementById('actions-edit').style.display = '';
  document.getElementById('actions-add').style.display  = 'none';
  document.getElementById('btn-revert').style.display = isEdited ? '' : 'none';

  const first = document.getElementById('f-title');
  if (first) { first.focus(); first.select(); }

  buildJump();
}

// ── Add entry form ────────────────────────────────────────────────────────
function showAddForm() {
  isAdding = true;
  // Guess defaults from current context
  const ref = filtered[currentIdx] || allScreenings[0] || {};
  const defSection = ref.section || 'competition';
  const defVenue   = filterVenue !== 'all' ? filterVenue : (ref.venue || 'GTL');
  const defDate    = ref.date || '2026-05-12';

  document.getElementById('card-pos').textContent = 'New Entry';
  document.getElementById('card-id').textContent  = '(auto-generated)';
  const pill = document.getElementById('status-pill');
  pill.textContent = 'New ＋'; pill.className = 'status-pill pill-edited';

  const FIELDS = [
    { key:'title',       label:'Title',         type:'text',   val:'' },
    { key:'titleEn',     label:'Title (EN)',     type:'text',   val:'' },
    { key:'director',    label:'Director',       type:'text',   val:'' },
    { key:'section',     label:'Section',        type:'select', opts:SECTIONS, val:defSection },
    { key:'venue',       label:'Venue',          type:'select', opts:VENUES,   val:defVenue },
    { key:'date',        label:'Date',           type:'text',   val:defDate },
    { key:'startTime',   label:'Start Time',     type:'text',   val:'' },
    { key:'durationMin', label:'Duration (min)', type:'number', val:'' },
    { key:'flags',       label:'Flags',          type:'text',   val:'' },
  ];

  let html = '';
  for (const f of FIELDS) {
    let inp;
    if (f.type === 'select') {
      const opts = f.opts.map(o => `<option value="${o}"${o===f.val?' selected':''}>${o}</option>`).join('');
      inp = `<select class="field-in" data-key="${f.key}" id="f-${f.key}">${opts}</select>`;
    } else {
      inp = `<input type="${f.type}" class="field-in" data-key="${f.key}" id="f-${f.key}" value="${esc(String(f.val))}">`;
    }
    html += `<div class="field-row"><div class="field-lbl">${f.label}</div><div>${inp}</div></div>`;
  }
  document.getElementById('fields').innerHTML = html;

  // Auto-fill from title
  const titleEl = document.getElementById('f-title');
  if (titleEl) {
    titleEl.setAttribute('list', 'title-list');
    titleEl.addEventListener('change', () => autoFillFromTitle(titleEl.value));
    titleEl.focus();
  }

  document.getElementById('actions-edit').style.display = 'none';
  document.getElementById('actions-add').style.display  = '';
  document.getElementById('jump-strip').style.display   = 'none';
}

function cancelAdd() {
  isAdding = false;
  document.getElementById('jump-strip').style.display = '';
  showCurrent();
}

function createEntry() {
  const titleEl = document.getElementById('f-title');
  if (!titleEl || !titleEl.value.trim()) { alert('Title is required.'); titleEl && titleEl.focus(); return; }

  const sc = { flags: [], isFree: false, isProgramme: false, films: [] };
  document.querySelectorAll('.field-in').forEach(el => {
    const key = el.dataset.key;
    if (key === 'flags')           sc[key] = el.value.split(',').map(x=>x.trim()).filter(Boolean);
    else if (el.type === 'number') sc[key] = el.value ? parseInt(el.value) : null;
    else                           sc[key] = el.value;
  });

  // Generate ID
  const day   = (sc.date||'').split('-')[2] || '00';
  const slug  = (sc.title||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
                  .replace(/[^a-z0-9]+/g,'-').slice(0,15).replace(/-$/,'');
  const time  = (sc.startTime||'').replace(':','');
  sc.id = `${(sc.venue||'xx').toLowerCase()}-${day}-${slug}-${time}`;

  // Assign group
  groupMap[sc.id] = filterGroup !== 'all' ? filterGroup : (groups[groups.length-1] || '');

  allScreenings.push(sc);
  newEntries.push(sc);
  filtered.push(sc);
  currentIdx = filtered.length - 1;

  // Update title index
  buildTitleIndex();
  buildTitleDatalist();

  isAdding = false;
  document.getElementById('jump-strip').style.display = '';
  reviewed.add(sc.id);
  updateUnsaved();
  updateProgress();
  showCurrent();
}

function markChanged() {
  const orig = allScreenings.find(x => x.id === filtered[currentIdx].id);
  if (!orig) return;
  document.querySelectorAll('.field-in').forEach(el => {
    const key = el.dataset.key;
    const origV = key === 'flags' ? (orig[key]||[]).join(',') : String(orig[key] == null ? '' : orig[key]);
    const curV  = el.value;
    el.classList.toggle('changed', curV !== origV);
  });
}

function collectEdits() {
  const sc = { ...getSc() };
  document.querySelectorAll('.field-in').forEach(el => {
    const key = el.dataset.key;
    if (key === 'flags') {
      sc[key] = el.value.split(',').map(x=>x.trim()).filter(Boolean);
    } else if (el.type === 'number') {
      sc[key] = el.value === '' ? null : parseInt(el.value);
    } else {
      sc[key] = el.value;
    }
  });
  return sc;
}

function hasChanges() {
  const orig = allScreenings.find(x => x.id === filtered[currentIdx].id);
  if (!orig) return false;
  const ed = collectEdits();
  return ['title','titleEn','director','section','venue','date','startTime','durationMin','flags'].some(k => {
    const ov = k==='flags' ? (orig[k]||[]).join(',') : String(orig[k]??'');
    const nv = k==='flags' ? (ed[k]||[]).join(',')   : String(ed[k]??'');
    return ov !== nv;
  });
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

// ── Actions ───────────────────────────────────────────────────────────────
function pass() {
  reviewed.add(filtered[currentIdx].id);
  updateProgress();
  goNext();
}

function saveAndNext() {
  if (!hasChanges()) { pass(); return; }
  const sc = collectEdits();
  edits.set(sc.id, sc);
  filtered[currentIdx] = sc;
  const i = allScreenings.findIndex(x => x.id === sc.id);
  if (i !== -1) allScreenings[i] = sc;
  reviewed.add(sc.id);
  // Offer to propagate director/titleEn/durationMin to matching titles
  propagateMeta(sc);
  buildTitleIndex(); // refresh after propagation
  updateUnsaved();
  updateProgress();
  goNext();
}

function revertCurrent() {
  const id = filtered[currentIdx].id;
  edits.delete(id);
  reviewed.delete(id);
  // restore from allScreenings
  const orig = allScreenings.find(x => x.id === id);
  if (orig) filtered[currentIdx] = orig;
  updateUnsaved();
  updateProgress();
  showCurrent();
}

function goNext() {
  if (currentIdx < filtered.length - 1) { currentIdx++; showCurrent(); }
  else { showCurrent(); alert('End of list — all entries in this filter reviewed!'); }
}

function goPrev() {
  if (currentIdx > 0) { currentIdx--; showCurrent(); }
}

function jumpTo(i) {
  currentIdx = i; showCurrent();
  document.getElementById('card-area').scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Jump strip ────────────────────────────────────────────────────────────
function buildJump() {
  if (!filtered.length) { document.getElementById('jump-strip').innerHTML = ''; return; }
  const chips = filtered.map((sc, i) => {
    const isCur    = i === currentIdx;
    const isEdited = edits.has(sc.id);
    const isOk     = reviewed.has(sc.id);
    let cls = isCur ? 'cur' : (isEdited ? 'edited' : (isOk ? 'ok' : ''));
    const day = (sc.date || '').split('-')[2] || '?';
    const lbl = `${day} ${sc.venue} ${sc.startTime}`;
    return `<div class="jump-chip ${cls}" onclick="jumpTo(${i})" title="${esc(sc.title)}">${lbl}</div>`;
  }).join('');
  document.getElementById('jump-strip').innerHTML = chips;
}

// ── Progress ──────────────────────────────────────────────────────────────
function updateProgress() {
  if (!allScreenings.length) return;
  const done = filtered.filter(sc => reviewed.has(sc.id) || edits.has(sc.id)).length;
  document.getElementById('progress').textContent =
    `${done} / ${filtered.length} reviewed   (${allScreenings.length} total)`;
}

function updateUnsaved() {
  const total = edits.size + newEntries.length;
  const el = document.getElementById('unsaved-badge');
  el.style.display = total ? '' : 'none';
  if (total) el.textContent = `● ${total} unsaved change${total>1?'s':''}`;
  document.getElementById('btn-save').disabled = total === 0;
}

// ── Keyboard ──────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (isAdding) {
    if (e.key === 'Escape') cancelAdd();
    return;
  }
  if (!filtered.length) return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') {
    if (e.key === 'Enter') { e.preventDefault(); saveAndNext(); }
    return;
  }
  if (e.key === 'Enter')      { pass(); }
  if (e.key === 'ArrowRight') { goNext(); }
  if (e.key === 'ArrowLeft')  { goPrev(); }
});

// ── Bindings ──────────────────────────────────────────────────────────────
document.getElementById('btn-open').addEventListener('click', openFile);
document.getElementById('btn-save').addEventListener('click', saveFile);
document.getElementById('btn-add').addEventListener('click', () => { if (allScreenings.length) showAddForm(); });
document.getElementById('btn-pass').addEventListener('click', pass);
document.getElementById('btn-save-next').addEventListener('click', saveAndNext);
document.getElementById('btn-prev').addEventListener('click', goPrev);
document.getElementById('btn-next').addEventListener('click', goNext);
document.getElementById('btn-revert').addEventListener('click', revertCurrent);
document.getElementById('btn-create').addEventListener('click', createEntry);
document.getElementById('btn-cancel-add').addEventListener('click', cancelAdd);
</script>
</body>
</html>
